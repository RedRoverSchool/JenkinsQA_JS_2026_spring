name: CI

on:
    pull_request:
        branches: [main]

jobs:
    run-test:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: true
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            # Ensures the runner has the correct Java version for Jenkins 2.541.3
            - name: Set up Java 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"

            - name: Check for duplicated file names
              run: |
                  git ls-files --exclude-standard --others --cached --no-empty-directory | sort -f > files.txt
                  uniq -di files.txt > duplicates.txt
                  if [[ -s duplicates.txt ]]; then
                    echo "Found files with the same name:"
                    cat duplicates.txt
                    exit 1
                  fi

            - name: Install dependencies
              run: npm ci

            - name: Build TypeScript
              run: npm run build

            - name: Install Playwright Browsers
              run: npx playwright install --with-deps

            - name: Update Submodule to Latest Remote
              run: git submodule update --remote _jenkins_data

            - name: Prepare Jenkins data
              run: |
                  cat ${{ github.workspace }}/_jenkins_data/jenkins_backup* > ${{ github.workspace }}/jenkins_backup.tar.gz
                  [ -s "${{ github.workspace }}/jenkins_backup.tar.gz" ] || { echo "Backup file is empty or missing!"; exit 1; }
                  md5sum ${{ github.workspace }}/jenkins_backup.tar.gz

            - name: Extract Jenkins data
              run: |
                  mkdir -p ${{ github.workspace }}/jenkins_home
                  tar -xvf ./jenkins_backup.tar.gz -C ${{ github.workspace }}/jenkins_home

            - name: Inject Boot Script to Sync Password
              run: |
                  mkdir -p ${{ github.workspace }}/jenkins_home/init.groovy.d
                  
                  cat << 'EOF' > ${{ github.workspace }}/jenkins_home/init.groovy.d/sync-pass.groovy
                  import jenkins.model.*
                  import hudson.security.*

                  def env = System.getenv()
                  def username = env.LOCAL_USERNAME
                  def password = env.LOCAL_PASSWORD

                  def realm = Jenkins.getInstance().getSecurityRealm()
                  if (realm instanceof HudsonPrivateSecurityRealm) {
                      realm.createAccount(username, password)
                      Jenkins.getInstance().save()
                      println "✅ Successfully synced Jenkins password"
                  }
                  EOF

            - name: Download and Start Jenkins (No Docker)
              env:
                  LOCAL_USERNAME: ${{ secrets.LOCAL_USERNAME }}
                  LOCAL_PASSWORD: ${{ secrets.LOCAL_PASSWORD }}
              run: |
                  curl -L https://get.jenkins.io/war-stable/2.541.3/jenkins.war -o jenkins.war
                  export JENKINS_HOME="${{ github.workspace }}/jenkins_home"
                  
                  # Java 25 execution
                  nohup java -Djenkins.install.runSetupWizard=false -jar jenkins.war --httpPort=8080 > jenkins_stdout.log 2>&1 &
                  echo $! > jenkins.pid
                  sleep 20

            - name: Wait for the Jenkins
              # Explicitly using 'bash' fixes the "Permission Denied" error
              run: bash ./.github/wait-for-jenkins.sh

            - name: Print Jenkins Logs on Failure
              if: always()
              run: cat jenkins_stdout.log

            - name: Run Playwright tests
              run: npm test
              env:
                  LOCAL_USERNAME: ${{ secrets.LOCAL_USERNAME}}
                  LOCAL_PASSWORD: ${{ secrets.LOCAL_PASSWORD}}
                  API_TOKEN: ${{ secrets.API_TOKEN}}
                  LOCAL_HOST: localhost
                  LOCAL_PORT: 8080
                  CI_RUN: true

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

            - name: Attach artifacts on failure
              uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: Artifacts
                  path: test-results/

            - name: Upload Debug Screenshot
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: jenkins-debug-screenshot
                  path: jenkins-debug-state.png
