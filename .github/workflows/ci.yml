name: CI

on:
    pull_request:
        branches: [main]

jobs:
    run-test:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: true
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Set up Java 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"

            - name: Check for duplicated file names
              run: |
                  git ls-files --exclude-standard --others --cached --no-empty-directory | sort -f > files.txt
                  uniq -di files.txt > duplicates.txt
                  if [[ -s duplicates.txt ]]; then
                    cat duplicates.txt
                    exit 1
                  fi

            - name: Install dependencies
              run: npm ci

            - name: Build TypeScript
              run: npm run build

            - name: Install Playwright Browsers
              run: npx playwright install --with-deps

            - name: Update Submodule
              run: git submodule update --remote _jenkins_data

            - name: Prepare Jenkins Home
              run: |
                  cat ${{ github.workspace }}/_jenkins_data/jenkins_backup* > jenkins_backup.tar.gz
                  md5sum jenkins_backup.tar.gz
                  
                  mkdir -p temp_extract
                  tar -xvf jenkins_backup.tar.gz -C temp_extract
                  
                  # Find the directory containing config.xml regardless of backup depth
                  REAL_DATA=$(find temp_extract -name "config.xml" -exec dirname {} \; | head -n 1)
                  mkdir -p ${{ github.workspace }}/jenkins_home
                  cp -R "$REAL_DATA"/. ${{ github.workspace }}/jenkins_home/
                  
                  # Cleanup old environment artifacts and force-skip Setup Wizard
                  rm -rf ${{ github.workspace }}/jenkins_home/war
                  rm -rf ${{ github.workspace }}/jenkins_home/updates
                  echo "2.0" > ${{ github.workspace }}/jenkins_home/jenkins.install.UpgradeWizard.state
                  echo "2.0" > ${{ github.workspace }}/jenkins_home/jenkins.install.InstallUtil.lastExecVersion
                  
                  rm -rf temp_extract jenkins_backup.tar.gz

            - name: Inject Password Sync Script
              run: |
                  mkdir -p ${{ github.workspace }}/jenkins_home/init.groovy.d
                  cat << 'EOF' > ${{ github.workspace }}/jenkins_home/init.groovy.d/sync-pass.groovy
                  import jenkins.model.*
                  import hudson.security.*

                  def instance = Jenkins.get()
                  def realm = instance.getSecurityRealm()
                  def target = System.getenv('LOCAL_USERNAME') 
                  def pass = System.getenv('LOCAL_PASSWORD')

                  if (realm instanceof HudsonPrivateSecurityRealm) {
                      // This forces Jenkins to re-hash the password and 
                      // overwrite any stale data from the '2.0' upgrade state.
                      realm.createAccount(target, pass)
                      instance.save()
                      
                      // Final verification check for the logs
                      def user = realm.getUser(target)
                      if (user != null) {
                          println "✅ SUCCESS: Account forced/synced for: ${target} (ID: ${user.getId()})"
                      }
                  } else {
                      println "❌ ERROR: Realm is ${realm.getClass().getName()}, not PrivateSecurityRealm"
                  }
                  EOF
              env:
                  LOCAL_USERNAME: ${{ secrets.LOCAL_USERNAME }}
                  LOCAL_PASSWORD: ${{ secrets.LOCAL_PASSWORD }}

            - name: Download and Start Jenkins
              env:
                  LOCAL_USERNAME: ${{ secrets.LOCAL_USERNAME }}
                  LOCAL_PASSWORD: ${{ secrets.LOCAL_PASSWORD }}
              run: |
                  curl -L https://get.jenkins.io/war-stable/2.541.3/jenkins.war -o jenkins.war
                  export JENKINS_HOME="${{ github.workspace }}/jenkins_home"
                  nohup java -Djenkins.install.runSetupWizard=false -jar jenkins.war --httpPort=8080 > jenkins_stdout.log 2>&1 &
                  echo $! > jenkins.pid
                  sleep 20

            - name: Wait for Jenkins
              run: |
                  bash ./.github/wait-for-jenkins.sh
                  # Give the Groovy script 15 seconds to finish updating the user database
                  sleep 15

            - name: 🔎 Verify Password Sync
              run: |
                  echo "--- Checking Jenkins Logs for Sync Confirmation ---"
                  grep "Password synced" jenkins_stdout.log || echo "❌ ERROR: The Groovy sync script never reported success!"

                  echo "--- Checking Password Secret Length (Safety Check) ---"
                  # This won't show the password, but tells us if it's empty or strangely short/long
                  echo "Password length: ${#LOCAL_PASSWORD}"
              env:
                  LOCAL_PASSWORD: ${{ secrets.LOCAL_PASSWORD }}

            - name: Run Playwright tests
              run: npm test
              env:
                  LOCAL_USERNAME: ${{ secrets.LOCAL_USERNAME}}
                  LOCAL_PASSWORD: ${{ secrets.LOCAL_PASSWORD}}
                  API_TOKEN: ${{ secrets.API_TOKEN}}
                  LOCAL_HOST: localhost
                  LOCAL_PORT: 8080
                  CI_RUN: true

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

            - name: Attach artifacts on failure
              uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: Artifacts
                  path: test-results/

            - name: Upload Debug Artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: login-debug
                  path: |
                      login-error-debug.html
                      login-error-screenshot.png
                      jenkins_stdout.log