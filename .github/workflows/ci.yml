name: CI

on:
    pull_request:
        branches: [main]

jobs:
    run-test:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: true
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            # Ensures the runner has the correct Java version for Jenkins 2.541.3
            - name: Set up Java 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"

            - name: Check for duplicated file names
              run: |
                  git ls-files --exclude-standard --others --cached --no-empty-directory | sort -f > files.txt
                  uniq -di files.txt > duplicates.txt
                  if [[ -s duplicates.txt ]]; then
                    echo "Found files with the same name:"
                    cat duplicates.txt
                    exit 1
                  fi

            - name: Install dependencies
              run: npm ci

            - name: Build TypeScript
              run: npm run build

            - name: Install Playwright Browsers
              run: npx playwright install --with-deps

            - name: Update Submodule to Latest Remote
              run: git submodule update --remote _jenkins_data

            - name: Prepare Jenkins data
              run: |
                  cat ${{ github.workspace }}/_jenkins_data/jenkins_backup* > ${{ github.workspace }}/jenkins_backup.tar.gz
                  [ -s "${{ github.workspace }}/jenkins_backup.tar.gz" ] || { echo "Backup file is empty or missing!"; exit 1; }
                  md5sum ${{ github.workspace }}/jenkins_backup.tar.gz

            - name: Extract Jenkins data (Final Clean Version)
              run: |
                  # 1. Start with a fresh, empty directory
                  rm -rf ${{ github.workspace }}/jenkins_home
                  mkdir -p ${{ github.workspace }}/temp_extract
                  
                  # 2. Extract
                  tar -xvf ./jenkins_backup.tar.gz -C ${{ github.workspace }}/temp_extract
                  
                  # 3. Locate the core data and move it to the ROOT of jenkins_home
                  REAL_DATA=$(find ${{ github.workspace }}/temp_extract -name "config.xml" -exec dirname {} \; | head -n 1)
                  mkdir -p ${{ github.workspace }}/jenkins_home
                  cp -R "$REAL_DATA"/. ${{ github.workspace }}/jenkins_home/
                  
                  # 4. Critical Cleanup to prevent 500 errors
                  # Remove old caches and force Jenkins to skip the setup wizard
                  rm -rf ${{ github.workspace }}/jenkins_home/war
                  rm -rf ${{ github.workspace }}/jenkins_home/updates
                  echo "2.0" > ${{ github.workspace }}/jenkins_home/jenkins.install.UpgradeWizard.state
                  echo "2.0" > ${{ github.workspace }}/jenkins_home/jenkins.install.InstallUtil.lastExecVersion
                  
                  # 5. Clean up temp files
                  rm -rf ${{ github.workspace }}/temp_extract

      
            # TO REMOVE
            - name: Directory Diagnostic
              run: |
                echo "--- Current Working Directory ---"
                pwd
                echo "--- Looking for config.xml (The heart of Jenkins) ---"
                find ${{ github.workspace }} -name "config.xml"
                echo "--- Content of jenkins_home ---"
                ls -R ${{ github.workspace }}/jenkins_home | head -n 20


            - name: Inject Boot Script to Sync Password
              run: |
                  # Ensure this goes into the freshly mapped directory
                  mkdir -p ${{ github.workspace }}/jenkins_home/init.groovy.d
                  cat << 'EOF' > ${{ github.workspace }}/jenkins_home/init.groovy.d/sync-pass.groovy
                  import jenkins.model.*
                  import hudson.security.*
                  
                  def instance = Jenkins.getInstance()
                  def user = instance.getSecurityRealm().getUser("${System.getenv('LOCAL_USERNAME')}")
                  def password = System.getenv('LOCAL_PASSWORD')
                  
                  if (user != null && password != null) {
                      user.addProperty(new hudson.security.HudsonPrivateSecurityRealm.Details(password))
                      user.save()
                      println "✅ Successfully synced Jenkins password for ${user.userId}"
                  } else {
                      println "❌ Failed to sync: User or Password env var missing"
                  }
                  EOF

            - name: Download and Start Jenkins (No Docker)
              env:
                  LOCAL_USERNAME: ${{ secrets.LOCAL_USERNAME }}
                  LOCAL_PASSWORD: ${{ secrets.LOCAL_PASSWORD }}
              run: |
                  curl -L https://get.jenkins.io/war-stable/2.541.3/jenkins.war -o jenkins.war
                  export JENKINS_HOME="${{ github.workspace }}/jenkins_home"
                  
                  # Java 25 execution
                  nohup java -Djenkins.install.runSetupWizard=false -jar jenkins.war --httpPort=8080 > jenkins_stdout.log 2>&1 &
                  echo $! > jenkins.pid
                  sleep 20

            - name: Wait for the Jenkins
              # Explicitly using 'bash' fixes the "Permission Denied" error
              run: bash ./.github/wait-for-jenkins.sh

            # TO REMOVE
            - name: Capture Jenkins State
              if: always()
              env:
                 LOCAL_USERNAME: ${{ secrets.LOCAL_USERNAME }}
                 LOCAL_PASSWORD: ${{ secrets.LOCAL_PASSWORD }}
              run: |
                 echo "--- 🔍 THE SMOKING GUN: JENKINS LOG OUTPUT ---"
                 # This will show the actual Java Exception causing the 500 error
                 if [ -f jenkins_stdout.log ]; then
                     tail -n 100 jenkins_stdout.log
                 else
                     echo "❌ jenkins_stdout.log not found. Checking process..."
                     ps aux | grep jenkins
                 fi

                 echo "--- 📁 DIRECTORY CHECK: WHERE IS CONFIG.XML? ---"
                 find ${{ github.workspace }}/jenkins_home -name "config.xml" | head -n 5

                 echo "--- 🌐 CHECKING PUBLIC HOME PAGE ---"
                 curl -I http://localhost:8080/ || echo "Server unreachable"

                 echo "--- 🔑 TESTING AUTHENTICATION ---"
                 # We expect a 500 here if the UI is broken, but we need to see the headers
                 curl -u "${LOCAL_USERNAME}:${LOCAL_PASSWORD}" -I http://localhost:8080/whoAmI/ || echo "Auth check failed"

                 echo "--- 📋 LISTING ALL JOBS ---"
                 # This will likely fail with a 500 until we fix the underlying Java error
                 curl -u "${LOCAL_USERNAME}:${LOCAL_PASSWORD}" \
                     "http://localhost:8080/api/json?tree=jobs\[name\]" | jq '.' || echo "⚠️ Could not retrieve JSON (Expected during 500 error)"

                     
            # TO REMOVE
            - name: Print Jenkins Logs on Failure
              if: always()
              run: cat jenkins_stdout.log

            - name: Run Playwright tests
              run: npm test
              env:
                  LOCAL_USERNAME: ${{ secrets.LOCAL_USERNAME}}
                  LOCAL_PASSWORD: ${{ secrets.LOCAL_PASSWORD}}
                  API_TOKEN: ${{ secrets.API_TOKEN}}
                  LOCAL_HOST: localhost
                  LOCAL_PORT: 8080
                  CI_RUN: true

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

            - name: Attach artifacts on failure
              uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: Artifacts
                  path: test-results/

            - name: Upload Debug Screenshot
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: jenkins-debug-screenshot
                  path: jenkins-debug-state.png
